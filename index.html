<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <!-- Preconnect к шрифтам для максимальной скорости -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LAYER 1: SVG Noise Filter (Оптимизирован для GPU: numOctaves снижен с 3 до 1) -->
    <svg id="noise-svg">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" stitchTiles="stitch" />
        </filter>
        <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>

    <!-- LAYER 2: Aurora Animated Background -->
    <div class="aurora-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- SIDEBAR (Arc Browser Style) -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="user-avatar">
                <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.03 0-4.43-.82-6.14-2.88C7.55 15.8 9.68 15 12 15s4.45.8 6.14 2.12C16.43 19.18 14.03 20 12 20z"/></svg>
            </div>
            <span class="user-name editable-name" id="sidebar-name" contenteditable="true" spellcheck="false">User</span>
        </div>

        <div class="nav-group">
                <span class="group-label">System</span>
                <div class="nav-item" data-url="chrome://bookmarks/">
                    <div class="active-indicator"></div>
                    <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
                    <span>Bookmarks</span>
                </div>
                <div class="nav-item" data-url="chrome://history/">
                    <div class="active-indicator"></div>
                    <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/><path d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                    <span>History</span>
                </div>
                <div class="nav-item" data-url="chrome://downloads/">
                    <div class="active-indicator"></div>
                    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    <span>Downloads</span>
                </div>
            </div>

            <div class="nav-group">
                <span class="group-label">Folders</span>
                <div class="nav-item" data-url="https://github.com">
                    <div class="active-indicator"></div>
                    <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                    <span>Projects</span>
                </div>
                <div class="nav-item" data-url="https://youtube.com">
                    <div class="active-indicator"></div>
                    <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                    <span>Favorites</span>
                </div>
                <div class="nav-item" data-url="https://open.spotify.com">
                    <div class="active-indicator"></div>
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
                    <span>Music</span>
                </div>
            </div>

            <div class="nav-spacer"></div>

            <div class="nav-item" data-url="chrome://extensions/">
                <div class="active-indicator"></div>
                <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
                <span>Extensions</span>
            </div>
    </aside>

    <!-- LAYER 3: Parallax Wrapper for Main Content -->
    <div id="parallax-wrapper">
        <!-- MAIN DASHBOARD -->
        <main class="dashboard">
            
            <!-- WIDGETS -->
            <header class="widgets-header">
                <div class="premium-glass widget-glass time-widget">
                    <span class="time" id="time">00:00</span>
                    <span class="date" id="date">--</span>
                </div>

                <div class="premium-glass widget-glass weather-widget">
                    <div class="weather-icon">
                        <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4s1.79-4 4-4h.71C7.37 7.69 9.48 6 12 6c3.04 0 5.5 2.46 5.5 5.5v.5H19c1.66 0 3 1.34 3 3s-1.34 3-3 3z"/></svg>
                    </div>
                    <div class="weather-info">
                        <span class="weather-temp" id="weather-temp">--</span>
                        <span class="weather-desc" id="weather-desc">--</span>
                    </div>
                </div>
            </header>

            <!-- SEARCH CAPSULE -->
            <section class="search-section">
                <h1 class="greeting-text" id="greeting"><span id="greeting-time">Hello, </span><span id="greeting-name" class="editable-name" contenteditable="true" spellcheck="false">User</span></h1>

                <div class="search-container">
                    <form action="https://www.google.com/search" method="get" id="search-form" class="search-bar premium-glass">
                        <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <input type="text" name="q" id="search-input" class="search-input" placeholder="Search the web or type a URL..." autocomplete="off" autofocus>
                        
                        <div class="search-actions">
                            <button type="button" class="action-btn" id="mic-btn" title="Голосовой поиск">
                                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                            </button>
                            <button type="button" class="action-btn" id="lens-btn" title="Поиск по картинке">
                                <svg viewBox="0 0 24 24"><path d="M19.5 5h-15A2.5 2.5 0 0 0 2 7.5v10A2.5 2.5 0 0 0 4.5 20h15a2.5 2.5 0 0 0 2.5-2.5v-10A2.5 2.5 0 0 0 19.5 5zm-15 13v-10h15l.01 10H4.5z"/><circle cx="12" cy="12.5" r="3.5"/><circle cx="17.5" cy="9.5" r="1"/></svg>
                            </button>
                            <button type="button" class="ai-btn" id="ai-mode-btn">
                                <svg viewBox="0 0 24 24"><path d="M19 3l-1.5 3.5L14 8l3.5 1.5L19 13l1.5-3.5L24 8l-3.5-1.5L19 3zm-6.5 2L10 12l-2.5-7L5 12l-2.5-7L0 12l5 2 2.5 7L10 14l2.5 7L15 14l5-2-7.5-7z"/></svg>
                                Режим ИИ
                            </button>
                        </div>
                        
                        <div class="search-glow"></div>
                    </form>

                    <div id="suggestions" class="suggestions-box premium-glass"></div>
                </div>

                <!-- CARDS GRID -->
                <div class="shortcuts-grid" id="shortcuts-grid">
                    <!-- JS Injected Cards -->
                </div>
            </section>
        </main>
    </div>

    <!-- LENS MODAL OVERLAY -->
    <div class="modal-overlay" id="lens-modal">
        <div class="modal-content premium-glass">
            <button class="modal-close" id="lens-close">&times;</button>
            <h2 class="modal-title">Поиск по изображению (Lens)</h2>
            
            <div class="drag-drop-area" id="drag-drop-area">
                <svg viewBox="0 0 24 24"><path d="M19.5 5h-15A2.5 2.5 0 0 0 2 7.5v10A2.5 2.5 0 0 0 4.5 20h15a2.5 2.5 0 0 0 2.5-2.5v-10A2.5 2.5 0 0 0 19.5 5zm-15 13v-10h15l.01 10H4.5z"/><circle cx="12" cy="12.5" r="3.5"/><circle cx="17.5" cy="9.5" r="1"/></svg>
                <p>Перетащите изображение сюда или <label for="lens-file" class="file-label">выберите файл</label></p>
                <input type="file" id="lens-file" accept="image/*" hidden>
            </div>
            
            <div class="modal-divider"><span>ИЛИ</span></div>
            
            <form id="lens-url-form" class="lens-url-form">
                <input type="url" id="lens-url-input" class="lens-url-input" placeholder="Вставьте ссылку на изображение" required autocomplete="off">
                <button type="submit" class="lens-submit-btn">Поиск</button>
            </form>
        </div>
    </div>

    <!-- MAIN SCRIPT -->
    <script src="script.js"></script>
</body>
</html>
